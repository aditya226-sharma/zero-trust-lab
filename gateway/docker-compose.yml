# Runs on the gateway VM (10.10.1.1).
#
# For testing without a real Authentik instance, a mock OIDC provider is
# included (mock-oidc service). In production, replace with real Authentik
# (Phase 1) and update oauth2-proxy.cfg + remove extra_hosts.
#
# Before first run:
#   1. Generate a cookie secret: python3 -c "import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
#      and put it in oauth2-proxy/oauth2-proxy.cfg
#   2. Put the Authentik (or mock) client_secret in oauth2-proxy/oauth2-proxy.cfg
#   3. mkdir -p ./shared-posture && this becomes the posture store volume

services:
  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies/policy.rego"
    volumes:
      - ./opa/policy.rego:/policies/policy.rego:ro
    ports:
      - "8181:8181"  # exposed for direct curl testing in Phase 4/7, remove for anything beyond a lab
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  authz-bridge:
    build: ./authz-bridge
    environment:
      OAUTH2_PROXY_AUTH_URL: "http://oauth2-proxy:4180/oauth2/auth"
      OPA_URL: "http://opa:8181/v1/data/ztlab/authz"
      POSTURE_STORE_PATH: "/shared/posture.json"
      WG_INTERFACE: "wg0"
      WG_SUBNET: "10.8.0"
      PEERS_CONF_PATH: "/data/peers.conf"
      AUDIT_LOG_PATH: "/data/audit.jsonl"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-ztlab-admin-token}"
      MAX_POSTURE_AGE_SECONDS: "300"
      RISK_THRESHOLD: "70"
    volumes:
      - ./shared-posture:/shared
      - ./authz-bridge/data:/data
    depends_on:
      opa:
        condition: service_healthy
      oauth2-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9191/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  demo-app:
    build: ../app
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  mock-oidc:
    build: ./mock-oidc
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/.well-known/openid-configuration')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
    command: ["--config=/etc/oauth2-proxy.cfg"]
    depends_on:
      mock-oidc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4180/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      authz-bridge:
        condition: service_healthy
      demo-app:
        condition: service_healthy
      oauth2-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - nginx-logs:/var/log/nginx:ro
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ztlab-grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  nginx-logs:
  loki-data:
  grafana-data:
