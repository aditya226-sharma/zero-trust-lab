# oauth2-proxy.cfg
# Fronts Authentik's OIDC flow so nginx can hand off login/callback
# without the demo app or authz-bridge needing to speak OIDC directly.
#
# NOTE: oauth2-proxy's flag names for passing through extra ID token
# claims (needed for mfa_verified / auth_time in authz-bridge/app.py)
# have shifted across versions. Verify --pass-user-headers and any
# extra-claim flags against whatever oauth2-proxy version you actually
# install — search current docs before trusting this file verbatim.

provider = "oidc"
oidc_issuer_url = "http://mock-oidc:9000"
client_id = "ztlab-app"
client_secret = "ztlab-app-secret-1234567890"
redirect_url = "https://app.ztlab.local/oauth2/callback"

# Use HTTP to mock OIDC (no TLS in docker networking)
ssl_insecure_skip_verify = true
cookie_secure = false

cookie_secret = "cdca876137a85aed167802844f7331ae"
cookie_samesite = "lax"

email_domains = ["*"]

# Makes oauth2-proxy usable as an nginx auth_request target directly too,
# though in this architecture authz-bridge calls it internally instead.
reverse_proxy = true
upstreams = ["static://202"]

pass_user_headers = true
set_xauthrequest = true
set_authorization_header = true
# Pass ID token claims via Authorization: Bearer <id_token> on /oauth2/auth
# response. authz-bridge decodes the JWT payload to extract auth_time,
# amr (MFA methods), email, and other claims — more reliable than relying
# on version-specific header names.

# Skip provider button, go straight to Authentik
skip_provider_button = true

http_address = "0.0.0.0:4180"
