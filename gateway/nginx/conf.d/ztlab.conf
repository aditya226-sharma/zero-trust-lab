server {
    listen 443 ssl;
    server_name app.ztlab.local;

    # Lab shortcut — self-signed certs are fine here, would NOT be
    # acceptable in a real deployment. Flagging per the master prompt's
    # instruction to call out lab-only shortcuts explicitly.
    ssl_certificate     /etc/nginx/certs/ztlab.crt;
    ssl_certificate_key /etc/nginx/certs/ztlab.key;

    # --- oauth2-proxy handles the actual login/callback flow with Authentik ---
    location /oauth2/ {
        proxy_pass       http://oauth2-proxy:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Forwarded-For         $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto       $scheme;
    }

    # --- Internal-only location the auth_request directive calls ---
    # This is NOT reachable directly by clients (internal;) — it's the
    # actual PEP decision point that nginx consults before proxying
    # anything to the app.
    location = /validate {
        internal;
        proxy_pass              http://authz-bridge:9191/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI    $uri;
        proxy_set_header        X-Original-Method $request_method;
        proxy_set_header        X-Forwarded-For   $remote_addr;
        proxy_set_header        Cookie            $http_cookie;
    }

    # --- Public zone ---
    location /public {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://demo-app:8080;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    # --- Sensitive zone (same enforcement path — OPA decides the extra
    # freshness requirement, nginx doesn't know or care that it's special) ---
    location /sensitive {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://demo-app:8080;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    location @denied {
        default_type text/plain;
        add_header X-ZTLab-Reason $ztlab_reason always;
        return 403 "denied by ztlab policy — check X-ZTLab-Reason header\n";
    }

    location = / {
        return 302 /public;
    }
}

server {
    listen 80;
    server_name app.ztlab.local;
    return 301 https://$host$request_uri;
}
