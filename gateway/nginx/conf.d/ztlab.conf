# Rate limiting zones — shared across all server blocks.
# Keys on $binary_remote_addr to prevent abuse while keeping memory usage
# low (~16KB per 16k unique IPs).
limit_req_zone $binary_remote_addr zone=ztlab_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ztlab_general:10m rate=20r/s;

server {
    listen 443 ssl;
    server_name app.ztlab.local;

    # Lab shortcut — self-signed certs are fine here, would NOT be
    # acceptable in a real deployment. Flagging per the master prompt's
    # instruction to call out lab-only shortcuts explicitly.
    ssl_certificate     /etc/nginx/certs/ztlab.crt;
    ssl_certificate_key /etc/nginx/certs/ztlab.key;

    # --- Security headers (defense-in-depth, even for a lab) ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS — self-signed certs break browsers, so keep max-age short for the
    # lab. In production: max-age=63072000; includeSubDomains; preload
    add_header Strict-Transport-Security "max-age=300" always;

    # --- oauth2-proxy handles the actual login/callback flow with Authentik ---
    # Rate-limited to prevent brute-force auth attempts.
    location /oauth2/ {
        limit_req zone=ztlab_auth burst=10 nodelay;
        proxy_pass       http://oauth2-proxy:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Forwarded-For         $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto       $scheme;
    }

    # --- Internal-only location the auth_request directive calls ---
    # This is NOT reachable directly by clients (internal;) — it's the
    # actual PEP decision point that nginx consults before proxying
    # anything to the app.
    location = /validate {
        internal;
        proxy_pass              http://authz-bridge:9191/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI    $uri;
        proxy_set_header        X-Original-Method $request_method;
        proxy_set_header        X-Forwarded-For   $remote_addr;
        proxy_set_header        Cookie            $http_cookie;
    }

    # --- Public zone ---
    location /public {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://demo-app:8080;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    # --- Sensitive zone (same enforcement path — OPA decides the extra
    # freshness requirement, nginx doesn't know or care that it's special) ---
    location /sensitive {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://demo-app:8080;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    # --- Data classification API (new feature — Data pillar) ---
    location /api/data {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://demo-app:8080;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    # --- Admin dashboard (new feature — requires admin auth) ---
    location /admin {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://authz-bridge:9191/admin;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    # --- WireGuard peer provisioning API (new feature — requires admin token) ---
    location /api/peers {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://authz-bridge:9191/api/peers;
        proxy_set_header     Host $host;
        proxy_set_header     Authorization $http_authorization;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    # --- Risk score API (new feature — continuous authentication) ---
    location /api/risk-score {
        auth_request        /validate;
        auth_request_set     $ztlab_reason $upstream_http_x_ztlab_reason;
        error_page 401       =302 /oauth2/sign_in;
        error_page 403       = @denied;

        proxy_pass           http://authz-bridge:9191/api/risk-score;
        proxy_set_header     Host $host;
        add_header           X-ZTLab-Reason $ztlab_reason always;
    }

    location @denied {
        default_type text/plain;
        add_header X-ZTLab-Reason $ztlab_reason always;
        return 403 "denied by ztlab policy — check X-ZTLab-Reason header\n";
    }

    location = / {
        return 302 /public;
    }
}

server {
    listen 80;
    server_name app.ztlab.local;
    return 301 https://$host$request_uri;
}
