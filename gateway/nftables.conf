#!/usr/sbin/nft -f

# Phase 0 — Default-deny nftables ruleset for gateway VM
# Policy: DROP on input by default, allow only what's explicitly needed
#
# Interfaces:
#   ens3 — trusted-net (10.10.1.1/24)
#   ens4 — untrusted-net (10.10.2.1/24)
#   wg0  — WireGuard (added in Phase 3)

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;

    # Allow loopback
    iif lo accept

    # Allow established/related (returning traffic for outbound connections)
    ct state established,related accept

    # Allow ICMP (ping) for troubleshooting — lab shortcut
    # WARNING: In production, ratelimit or drop ICMP entirely
    ip protocol icmp accept
    ip6 protocol icmpv6 accept

    # SSH on all interfaces (for management)
    tcp dport 22 accept

    # HTTPS on all interfaces (nginx in Phase 4)
    tcp dport 443 accept

    # WireGuard port (Phase 3) — UDP only per spec
    udp dport 51820 accept

    # Everything else is dropped by policy
    log prefix "nftables-drop: " limit rate 5/minute
  }

  chain forward {
    type filter hook forward priority 0; policy drop;

    # Allow forwarding between trusted-net and untrusted-net only via gateway
    # This will be refined in Phase 3 with WireGuard rules
    iif ens3 oif ens4 ct state established,related accept
    iif ens4 oif ens3 ct state established,related accept
  }

  chain output {
    type filter hook output priority 0; policy accept;
  }
}
