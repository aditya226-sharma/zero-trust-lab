# Phase 3 — WireGuard Server Config (gateway VM: 10.10.1.1)
# Interface: wg0 on 10.8.0.1/24
# Only path into app VM — no traffic to app:443 is accepted unless it arrives via wg0

[Interface]
Address = 10.8.0.1/24
ListenPort = 51820
PrivateKey = <server-private-key>   # Generate: wg genkey | tee /etc/wireguard/server.key
# Public key: cat /etc/wireguard/server.key | wg pubkey

# Firewall marking — used by nftables to identify WireGuard traffic
# This is how nftables can distinguish "came via wg0" from other traffic
PostUp = nft add table inet wireguard
PostUp = nft add chain inet wireguard forward '{ type filter hook forward priority 0; policy accept; }'
PostUp = nft add rule inet wireguard forward iif wg0 accept
PostUp = nft add rule inet wireguard forward oif wg0 accept
PostDown = nft delete table inet wireguard

# Peers are added dynamically via the manual approval flow
# Run: ./scripts/wg-add-peer.sh <public-key> <ip> <device-name>
